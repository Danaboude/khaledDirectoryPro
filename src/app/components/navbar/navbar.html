<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 h-20">
  <div class="flex justify-between items-center px-6 md:px-12 h-full w-full max-w-screen-2xl mx-auto flex-row-reverse">
    <div class="flex items-center gap-12 flex-row-reverse">
      <a routerLink="/" class="text-2xl font-extrabold text-primary tracking-tight">DirectoryPro</a>
      <div class="hidden md:flex items-center gap-8 font-medium text-sm flex-row-reverse">
        <a routerLink="/" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1" [routerLinkActiveOptions]="{exact: true}" class="text-on-surface-variant hover:text-primary transition-colors">الرئيسية</a>
        <a routerLink="/search" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1" class="text-on-surface-variant hover:text-primary transition-colors">الفئات</a>
        <a class="text-on-surface-variant hover:text-primary transition-colors cursor-pointer">الأسعار</a>
        <a class="text-on-surface-variant hover:text-primary transition-colors cursor-pointer">من نحن</a>
      </div>
    </div>
    <div class="flex items-center gap-4 flex-row-reverse">
      @if (authService.user$ | async; as user) {
        <div class="flex items-center gap-3">
          <img [src]="user.photoURL" class="w-8 h-8 rounded-full border border-slate-200" alt="User Avatar">
          <button (click)="logout()" class="text-sm font-semibold text-on-surface-variant hover:text-primary px-4">تسجيل الخروج</button>
        </div>
      } @else {
        <button (click)="login()" class="text-sm font-semibold text-on-surface-variant hover:text-primary px-4">تسجيل الدخول</button>
      }
      <button routerLink="/dashboard" class="bg-primary hover:bg-secondary text-white px-6 py-2.5 rounded-full font-bold text-sm transition-all shadow-lg shadow-primary/10">
        أضف نشاطك التجاري
      </button>
    </div>
  </div>
</nav>
