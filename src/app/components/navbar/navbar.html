<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 h-20">
  <div class="flex justify-between items-center px-6 md:px-12 h-full w-full max-w-screen-2xl mx-auto">
    <!-- Logo & Desktop Nav -->
    <div class="flex items-center gap-12">
      <a routerLink="/" class="flex items-center">
        <img src="/logo.png" class="h-16 w-auto" alt="بوابة - Bawaba">
      </a>
      <!-- Desktop Links -->
      <div class="hidden md:flex items-center gap-8 font-medium text-sm">
        <a routerLink="/" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-on-surface-variant hover:text-primary transition-colors">الرئيسية</a>
        <a routerLink="/search" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          class="text-on-surface-variant hover:text-primary transition-colors">القطاعات</a>
        <a routerLink="/about" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          class="text-on-surface-variant hover:text-primary transition-colors">من نحن</a>
      </div>
    </div>

    <!-- Actions -->
    <div class="flex items-center gap-4">
      <!-- Auth Status -->
      @if (authService.user$ | async; as user) {
      <div class="hidden md:flex items-center gap-3">
        <img [src]="user.photoURL" class="w-8 h-8 rounded-full border border-slate-200" alt="User Avatar">
        <img (click)="logout()" src="/jci.png" class="h-8 w-auto cursor-pointer hover:opacity-80 transition-opacity"
          alt="Logout (JCI)">
      </div>
      } @else {
      <img (click)="login()" src="/jci.png" class="h-16 w-auto hidden md:block cursor-pointer hover:opacity-80 transition-opacity"
        alt="Login (JCI)">
      }

      <!-- Mobile Menu Button -->
      <button (click)="toggleMenu()" class="md:hidden p-2 text-on-surface-variant hover:text-primary transition-colors">
        <span class="material-symbols-outlined text-3xl">
          {{ isMenuOpen() ? 'close' : 'menu' }}
        </span>
      </button>
    </div>
  </div>

  <!-- Mobile Navigation Overlay -->
  @if (isMenuOpen()) {
  <div class="fixed inset-0 top-20 bg-white z-40 md:hidden animate-in fade-in duration-300">
    <div class="flex flex-col p-6 gap-6 font-medium text-lg border-t border-slate-100">
      <a routerLink="/" (click)="isMenuOpen.set(false)"
        routerLinkActive="text-primary font-bold" [routerLinkActiveOptions]="{exact: true}"
        class="text-on-surface-variant flex items-center justify-between border-b border-slate-50 pb-4">
        الرئيسية
        <span class="material-symbols-outlined text-slate-300">chevron_left</span>
      </a>
      <a routerLink="/search" (click)="isMenuOpen.set(false)"
        routerLinkActive="text-primary font-bold"
        class="text-on-surface-variant flex items-center justify-between border-b border-slate-50 pb-4">
        القطاعات
        <span class="material-symbols-outlined text-slate-300">chevron_left</span>
      </a>
      <a routerLink="/about" (click)="isMenuOpen.set(false)"
        routerLinkActive="text-primary font-bold"
        class="text-on-surface-variant flex items-center justify-between border-b border-slate-50 pb-4">
        من نحن
        <span class="material-symbols-outlined text-slate-300">chevron_left</span>
      </a>

      <!-- Mobile Auth Action -->
      <div class="mt-8">
        @if (authService.user$ | async; as user) {
        <div class="flex items-center justify-between bg-slate-50 p-4 rounded-xl">
          <div class="flex items-center gap-3">
            <img [src]="user.photoURL" class="w-10 h-10 rounded-full border border-slate-200" alt="User Avatar">
            <span class="text-sm font-bold text-slate-700">{{ user.displayName }}</span>
          </div>
          <button (click)="logout()" class="text-primary text-sm font-bold">تسجيل الخروج</button>
        </div>
        } @else {
        <div (click)="login()" class="flex items-center justify-between bg-primary/5 p-5 rounded-2xl cursor-pointer group">
          <div>
            <h4 class="font-bold text-primary mb-1">سجل دخولك</h4>
            <p class="text-xs text-primary/60">عبر JCI سوريا</p>
          </div>
          <img src="/jci.png" class="h-10 w-auto" alt="JCI">
        </div>
        }
      </div>
    </div>
  </div>
  }
</nav>
