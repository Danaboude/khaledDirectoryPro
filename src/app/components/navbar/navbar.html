<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 h-20">
  <div class="flex justify-between items-center px-6 md:px-12 h-full w-full max-w-screen-2xl mx-auto">
    <div class="flex items-center gap-12">
      <a routerLink="/" class="flex items-center">
        <img src="/logo.png" class="h-16 w-auto" alt="بوابة - Bawaba">
      </a>
      <div class="hidden md:flex items-center gap-8 font-medium text-sm">
        <a routerLink="/" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-on-surface-variant hover:text-primary transition-colors">الرئيسية</a>
        <a routerLink="/search" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          class="text-on-surface-variant hover:text-primary transition-colors">القطاعات</a>
        <a routerLink="/about" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          class="text-on-surface-variant hover:text-primary transition-colors">من نحن</a>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-4">
        @if (authService.user$ | async; as user) {
        <div class="flex items-center gap-3">
          <img [src]="user.photoURL" class="w-8 h-8 rounded-full border border-slate-200" alt="User Avatar">
          <img (click)="logout()" src="/jci.png" class="h-8 w-auto cursor-pointer hover:opacity-80 transition-opacity"
            alt="Logout (JCI)">
        </div>
        } @else {
        <img (click)="login()" src="/jci.png" class="h-16 w-auto cursor-pointer hover:opacity-80 transition-opacity"
          alt="Login (JCI)">
        }

      </div>
    </div>
  </div>
</nav>
