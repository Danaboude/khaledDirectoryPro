<nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-xl border-b border-slate-100 h-20">
  <div class="flex justify-between items-center px-6 md:px-12 h-full w-full max-w-screen-2xl mx-auto">
    <div class="flex items-center gap-12">
      <a routerLink="/" class="flex items-center">
        <img src="/logo.png" class="h-12 w-auto" alt="بوابة - Bawaba">
      </a>
      <div class="hidden md:flex items-center gap-8 font-medium text-sm">
        <a routerLink="/" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          [routerLinkActiveOptions]="{exact: true}"
          class="text-on-surface-variant hover:text-primary transition-colors">الرئيسية</a>
        <a routerLink="/search" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          class="text-on-surface-variant hover:text-primary transition-colors">الفئات</a>
        <a routerLink="/about" routerLinkActive="text-primary font-bold border-b-2 border-primary pb-1"
          class="text-on-surface-variant hover:text-primary transition-colors">من نحن</a>
      </div>
    </div>
    <div class="flex items-center gap-6">
      <div class="flex items-center gap-4">
        @if (authService.user$ | async; as user) {
        <div class="flex items-center gap-3">
          <img [src]="user.photoURL" class="w-8 h-8 rounded-full border border-slate-200" alt="User Avatar">
          <button (click)="logout()" class="text-sm font-semibold text-on-surface-variant hover:text-primary px-4">تسجيل
            الخروج</button>
        </div>
        } @else {
        <button (click)="login()" class="text-sm font-semibold text-on-surface-variant hover:text-primary px-4">تسجيل
          الدخول</button>
        }

      </div>
      <div class="hidden lg:flex items-center gap-3 border-r border-slate-200 pr-6 mr-2">
        <div class="text-left">
          <p class="text-[9px] text-on-surface-variant font-bold leading-none uppercase tracking-tighter">بالشراكة
            الاستراتيجية مع</p>
          <p class="text-[11px] text-secondary font-black leading-none">JCI Syria</p>
        </div>
        <img src="/jci.png" class="h-10 w-auto opacity-90" alt="JCI Syria Logo">
      </div>
    </div>
  </div>
</nav>
